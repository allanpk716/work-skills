[pytest]
# Test discovery
testpaths = plugins/windows-git-commit/skills/windows-git-commit/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Benchmark settings
benchmark_warmup = true
benchmark_min_rounds = 5
benchmark_max_time = 2.0
benchmark_sort = mean
benchmark_columns = mean, stddev, median, rounds

# Output options
addopts = -v --tb=short
