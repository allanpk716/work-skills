    discovered_in: "Phase 32, Plan 01"
    description: |
      golang.md template: parseGoStack returns anonymous struct incompatible with PointJSON internal Frame type.
      Frame was defined inside PointJSON as a local type, while parseGoStack returned a separate anonymous struct.
      This caused template code to fail compilation: parseGoStack return value could not be assigned to Entry.Frames ([]Frame).
    steps_to_reproduce: |
      1. Copy Base Library code from golang.md to new project codepoint/codepoint.go
      2. Create go.mod (module template-test)
      3. Run go build ./codepoint/...
      4. Compilation fails: undefined: Frame
    expected: "Frame is package-level type, parseGoStack returns []Frame, entire Base Library compiles independently"
    actual: "Frame defined inside PointJSON, parseGoStack returns anonymous struct, compilation fails"
    status: fixed
    fixed_in: "commit 088f086"
    fixed_by: "Phase 32 Plan 01"
    verification: |
      golang.md template independent compilation:
      cd tmp/template-test/go && go build ./...
      Expected: zero errors
      [VERIFIED: 2026-04-18]

